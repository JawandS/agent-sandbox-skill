AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Web search sandbox — ephemeral Lambda for AI agent isolation.
  Uses the pre-existing LabRole (AWS Academy) instead of creating an IAM role,
  since Academy accounts do not permit iam:CreateRole.

Parameters:
  LabRoleArn:
    Type: String
    Description: ARN of the pre-existing LabRole to attach to the Lambda function.

Resources:
  SearchLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: web-search-sandbox-fn
      Runtime: python3.12
      Handler: index.handler
      Role: !Ref LabRoleArn
      Timeout: 30
      Code:
        ZipFile: |
          import json, urllib.request, boto3, datetime

          def handler(event, context):
              sm = boto3.client("secretsmanager", region_name="us-east-1")
              secret = sm.get_secret_value(SecretId="openai-api-key")["SecretString"]
              api_key = json.loads(secret)["api_key"] if secret.strip().startswith("{") else secret.strip()

              query = event.get("query", "")
              if not query:
                  return {"error": "Missing required field: query"}

              payload = json.dumps({
                  "model": "gpt-4o-mini",
                  "tools": [{"type": "web_search_preview"}],
                  "input": query,
              }).encode()

              req = urllib.request.Request(
                  "https://api.openai.com/v1/responses",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {api_key}",
                      "Content-Type": "application/json",
                  },
              )

              with urllib.request.urlopen(req, timeout=25) as resp:
                  data = json.loads(resp.read())

              message = next(o for o in data["output"] if o["type"] == "message")
              content = message["content"][0]
              text = content["text"]
              annotations = content.get("annotations", [])

              sources = [
                  {
                      "title": a.get("title", ""),
                      "url": a["url"],
                      "snippet": text[a["start_index"]: a["end_index"]],
                  }
                  for a in annotations
                  if a["type"] == "url_citation"
              ]

              return {
                  "query": query,
                  "summary": text,
                  "sources": sources,
                  "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
              }

Outputs:
  LambdaFunctionName:
    Value: !Ref SearchLambda
    Description: Lambda function name for invocation
